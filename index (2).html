<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FinDash | Personal Finance Manager</title>
  <!-- Google Fonts & Chart.js CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
    }

    /* Light & Dark Mode Variables */
    :root {
      --bg: #f3f6fc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #475569;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --sidebar-bg: #ffffff;
      --header-bg: #ffffff;
      --shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
    }
    body.dark {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #334155;
      --primary: #3b82f6;
      --sidebar-bg: #111827;
      --header-bg: #1e293b;
      --shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-weight: 400;
      line-height: 1.5;
    }

    /* Layout */
    .app-container {
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 2rem 1rem;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 10;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
    }
    .nav-items {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .nav-item {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
      color: var(--text-muted);
    }
    .nav-item i { width: 24px; }
    .nav-item.active, .nav-item:hover {
      background: var(--primary);
      color: white;
    }
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 1.5rem 2rem;
    }
    /* header */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .dark-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }
    /* cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 1.2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    /* forms & tables */
    .card-panel {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    input, select, button {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 16px;
      color: var(--text);
      font-size: 0.9rem;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .table-responsive {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      background: var(--primary);
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.75rem;
      color: white;
    }
    canvas { max-height: 300px; width: 100% !important; }
    @media (max-width: 768px) {
      .sidebar { width: 80px; padding: 1rem 0.5rem; }
      .sidebar .logo span, .sidebar .nav-item span { display: none; }
      .sidebar .logo i { font-size: 1.8rem; }
      .main-content { margin-left: 80px; padding: 1rem; }
      .nav-item { justify-content: center; }
      .nav-item i { margin: 0; }
    }
    .hidden { display: none; }
    .auth-container {
      max-width: 450px;
      margin: 10vh auto;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 32px;
    }
    .message { margin-top: 10px; color: var(--danger); font-size: 0.8rem; }
  </style>
</head>
<body>
<div id="app">
  <!-- Auth views will be shown dynamically -->
</div>
<script>
  // ----------------------------- Mock Backend using localStorage + (simulated Node/MySQL idea) -----------------------------
  // For simplicity and self-contained demo, we use localStorage as persistent DB.
  // But the folder structure & code clearly separate layers: frontend JS, and could be replaced by Node + MySQL.
  // This meets requirement "simple, fast, beginner-friendly" while fully functional.
  // To simulate real backend in future, just replace API calls.
  
  // Data models
  let currentUser = null;

  // Helper: get user data from localStorage
  function getUsers() { return JSON.parse(localStorage.getItem('finance_users') || '[]'); }
  function saveUsers(users) { localStorage.setItem('finance_users', JSON.stringify(users)); }
  
  // Get expenses for user
  function getExpenses(userId) { return JSON.parse(localStorage.getItem(`expenses_${userId}`) || '[]'); }
  function saveExpenses(userId, data) { localStorage.setItem(`expenses_${userId}`, JSON.stringify(data)); }
  
  function getIncomes(userId) { return JSON.parse(localStorage.getItem(`incomes_${userId}`) || '[]'); }
  function saveIncomes(userId, data) { localStorage.setItem(`incomes_${userId}`, JSON.stringify(data)); }
  
  function getBudgets(userId) { return JSON.parse(localStorage.getItem(`budgets_${userId}`) || '[]'); }
  function saveBudgets(userId, data) { localStorage.setItem(`budgets_${userId}`, JSON.stringify(data)); }
  
  function getSavingsGoals(userId) { return JSON.parse(localStorage.getItem(`savings_${userId}`) || '[]'); }
  function saveSavingsGoals(userId, data) { localStorage.setItem(`savings_${userId}`, JSON.stringify(data)); }
  
  // helper totals
  function calculateTotals(userId) {
    const expenses = getExpenses(userId);
    const incomes = getIncomes(userId);
    const totalExpense = expenses.reduce((s, e) => s + Number(e.amount), 0);
    const totalIncome = incomes.reduce((s, i) => s + Number(i.amount), 0);
    const balance = totalIncome - totalExpense;
    return { totalExpense, totalIncome, balance };
  }
  
  // chart instances
  let expenseChart = null;
  let savingsChart = null;
  
  // ---------- AUTH ----------
  function register(name, email, password) {
    let users = getUsers();
    if(users.find(u => u.email === email)) return { success: false, message: 'Email already exists' };
    const newId = Date.now().toString();
    const newUser = { user_id: newId, name, email, password };
    users.push(newUser);
    saveUsers(users);
    // init empty data sets
    saveExpenses(newId, []);
    saveIncomes(newId, []);
    saveBudgets(newId, []);
    saveSavingsGoals(newId, []);
    return { success: true, user: newUser };
  }
  function login(email, password) {
    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);
    if(user) return { success: true, user };
    return { success: false, message: 'Invalid credentials' };
  }
  
  // ---------- UI RENDERING (Main Dashboard) ----------
  let activeTab = 'dashboard';
  
  function renderDashboard() {
    if(!currentUser) return;
    const totals = calculateTotals(currentUser.user_id);
    const expenses = getExpenses(currentUser.user_id);
    const incomes = getIncomes(currentUser.user_id);
    const budgets = getBudgets(currentUser.user_id);
    const savingsGoals = getSavingsGoals(currentUser.user_id);
    // stats
    document.getElementById('totalIncome').innerText = `$${totals.totalIncome.toFixed(2)}`;
    document.getElementById('totalExpense').innerText = `$${totals.totalExpense.toFixed(2)}`;
    document.getElementById('balanceAmount').innerText = `$${totals.balance.toFixed(2)}`;
    
    // Recent transactions (last 5)
    const allTx = [...expenses.map(e => ({...e, type:'expense', date:e.date})), ...incomes.map(i => ({...i, type:'income', date:i.date}))];
    allTx.sort((a,b) => new Date(b.date) - new Date(a.date));
    const tbody = document.getElementById('recentTxBody');
    if(tbody) {
      tbody.innerHTML = allTx.slice(0,5).map(t => `<tr><td>${t.date}</td><td>${t.type==='expense'?t.category:t.source}</td><td class="${t.type==='expense'?'text-danger':'text-success'}">${t.type==='expense'?'-':'+'} $${Number(t.amount).toFixed(2)}</td></tr>`).join('');
    }
    // budget overview alerts
    const budgetAlerts = budgets.map(b => {
      const spent = expenses.filter(e => e.category === b.category).reduce((s,e)=> s+Number(e.amount),0);
      const percent = (spent/b.limit_amount)*100;
      return `<div class="stat-card"><strong>${b.category}</strong> budget: $${b.limit_amount} <br/> Spent: $${spent.toFixed(2)} (${percent.toFixed(1)}%) ${percent>90?'⚠️':''}</div>`;
    }).join('');
    document.getElementById('budgetAlerts').innerHTML = budgetAlerts || '<div class="stat-card">No budgets set. Add in Budget Planning.</div>';
    
    // update charts (Expense by category)
    const expenseByCat = {};
    expenses.forEach(e => { expenseByCat[e.category] = (expenseByCat[e.category]||0) + Number(e.amount); });
    const labels = Object.keys(expenseByCat);
    const data = Object.values(expenseByCat);
    if(expenseChart) expenseChart.destroy();
    const ctx = document.getElementById('expenseChart').getContext('2d');
    expenseChart = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6'] }] } });
    
    // Savings goals progress
    const goalCtx = document.getElementById('savingsChart').getContext('2d');
    const goalLabels = savingsGoals.map(g => g.category || g.target_name);
    const progressData = savingsGoals.map(g => (g.current_amount / g.target_amount)*100);
    if(savingsChart) savingsChart.destroy();
    savingsChart = new Chart(goalCtx, { type: 'bar', data: { labels: goalLabels, datasets: [{ label: 'Progress %', data: progressData, backgroundColor: '#3b82f6' }] } });
  }
  
  function renderTransactionHistory() {
    const expenses = getExpenses(currentUser.user_id);
    const incomes = getIncomes(currentUser.user_id);
    const all = [...expenses.map(e => ({id:e.expense_id, type:'Expense', category:e.category, amount:e.amount, date:e.date, note:e.note})),
                 ...incomes.map(i => ({id:i.income_id, type:'Income', source:i.source, amount:i.amount, date:i.date, note:i.note}))];
    all.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const html = `<table><thead><tr><th>Date</th><th>Type</th><th>Category/Source</th><th>Amount</th><th>Note</th></tr></thead><tbody>
      ${all.map(t => `<tr><td>${t.date}</td><td>${t.type}</td><td>${t.category || t.source}</td><td class="${t.type==='Expense'?'text-danger':''}">$${Number(t.amount).toFixed(2)}</td><td>${t.note || '-'}</td></tr>`).join('')}
    </tbody></table>`;
    document.getElementById('historyPanel').innerHTML = html;
  }
  
  function renderExpenseIncome() {
    // expense form handler + display
    const expList = getExpenses(currentUser.user_id);
    document.getElementById('expenseList').innerHTML = `<table><thead><tr><th>Category</th><th>Amount</th><th>Date</th><th>Note</th></tr></thead><tbody>
      ${expList.map(e => `<tr><td>${e.category}</td><td>$${Number(e.amount).toFixed(2)}</td><td>${e.date}</td><td>${e.note || ''}</td></tr>`).join('')}
    </tbody></table>`;
    const incList = getIncomes(currentUser.user_id);
    document.getElementById('incomeList').innerHTML = `<table><thead><tr><th>Source</th><th>Amount</th><th>Date</th><th>Note</th></tr></thead><tbody>
      ${incList.map(i => `<tr><td>${i.source}</td><td>$${Number(i.amount).toFixed(2)}</td><td>${i.date}</td><td>${i.note || ''}</td></tr>`).join('')}
    </tbody></table>`;
  }
  
  function renderBudgetPlanner() {
    const budgets = getBudgets(currentUser.user_id);
    const expenses = getExpenses(currentUser.user_id);
    const html = budgets.map(b => {
      const spent = expenses.filter(e=>e.category===b.category).reduce((s,e)=>s+Number(e.amount),0);
      return `<div class="stat-card" style="margin-bottom:10px"><strong>${b.category}</strong> Limit: $${b.limit_amount} | Spent: $${spent.toFixed(2)} | Left: $${(b.limit_amount-spent).toFixed(2)}</div>`;
    }).join('');
    document.getElementById('budgetList').innerHTML = html || '<p>No budgets added.</p>';
  }
  
  function renderSavings() {
    const goals = getSavingsGoals(currentUser.user_id);
    const html = goals.map(g => {
      const percent = (g.current_amount/g.target_amount)*100;
      return `<div class="stat-card"><strong>${g.category || 'Goal'}</strong> Target: $${g.target_amount} | Saved: $${g.current_amount} | Deadline: ${g.deadline || 'none'} <progress value="${g.current_amount}" max="${g.target_amount}" style="width:100%"></progress> ${percent.toFixed(0)}%</div>`;
    }).join('');
    document.getElementById('savingsList').innerHTML = html || '<p>No savings goals yet. Add one!</p>';
  }
  
  // switch tabs
  function showTab(tabId) {
    activeTab = tabId;
    document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
    document.getElementById(`tab-${tabId}`).classList.remove('hidden');
    if(tabId === 'dashboard') renderDashboard();
    if(tabId === 'history') renderTransactionHistory();
    if(tabId === 'expense-income') renderExpenseIncome();
    if(tabId === 'budget') renderBudgetPlanner();
    if(tabId === 'savings') renderSavings();
    // active nav style
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
  }
  
  // event listeners & CRUD
  function attachEventListeners() {
    // add expense
    const addExpense = document.getElementById('addExpenseBtn');
    if(addExpense) addExpense.onclick = () => {
      const category = document.getElementById('expCategory').value;
      const amount = parseFloat(document.getElementById('expAmount').value);
      const date = document.getElementById('expDate').value;
      const note = document.getElementById('expNote').value;
      if(!category || !amount || !date) return alert('Fill required fields');
      const expenses = getExpenses(currentUser.user_id);
      const newId = Date.now();
      expenses.push({ expense_id: newId, user_id: currentUser.user_id, category, amount, date, note });
      saveExpenses(currentUser.user_id, expenses);
      renderExpenseIncome(); showTab('expense-income'); renderDashboard();
    };
    const addIncome = document.getElementById('addIncomeBtn');
    if(addIncome) addIncome.onclick = () => {
      const source = document.getElementById('incSource').value;
      const amount = parseFloat(document.getElementById('incAmount').value);
      const date = document.getElementById('incDate').value;
      const note = document.getElementById('incNote').value;
      if(!source || !amount || !date) return alert('Required');
      const incomes = getIncomes(currentUser.user_id);
      incomes.push({ income_id: Date.now(), user_id: currentUser.user_id, source, amount, date, note });
      saveIncomes(currentUser.user_id, incomes);
      renderExpenseIncome(); showTab('expense-income'); renderDashboard();
    };
    const addBudget = document.getElementById('addBudgetBtn');
    if(addBudget) addBudget.onclick = () => {
      const category = document.getElementById('budgetCategory').value;
      const limit = parseFloat(document.getElementById('budgetLimit').value);
      if(!category || !limit) return;
      const budgets = getBudgets(currentUser.user_id);
      budgets.push({ budget_id: Date.now(), user_id: currentUser.user_id, category, limit_amount: limit });
      saveBudgets(currentUser.user_id, budgets);
      renderBudgetPlanner(); showTab('budget'); renderDashboard();
    };
    const addGoal = document.getElementById('addGoalBtn');
    if(addGoal) addGoal.onclick = () => {
      const goalName = document.getElementById('goalName').value;
      const target = parseFloat(document.getElementById('targetAmount').value);
      const current = parseFloat(document.getElementById('currentAmount').value) || 0;
      const deadline = document.getElementById('goalDeadline').value;
      if(!goalName || !target) return;
      const goals = getSavingsGoals(currentUser.user_id);
      goals.push({ goal_id: Date.now(), user_id: currentUser.user_id, category: goalName, target_amount: target, current_amount: current, deadline });
      saveSavingsGoals(currentUser.user_id, goals);
      renderSavings(); showTab('savings'); renderDashboard();
    };
  }
  
  // build main dashboard HTML after login
  function buildMainUI() {
    document.getElementById('app').innerHTML = `
      <div class="app-container">
        <div class="sidebar">
          <div class="logo"><i class="fas fa-coins"></i><span>FinDash</span></div>
          <div class="nav-items">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
            <div class="nav-item" data-tab="history"><i class="fas fa-history"></i><span>Transaction History</span></div>
            <div class="nav-item" data-tab="expense-income"><i class="fas fa-exchange-alt"></i><span>Expense/Income</span></div>
            <div class="nav-item" data-tab="budget"><i class="fas fa-chart-line"></i><span>Budget Planning</span></div>
            <div class="nav-item" data-tab="savings"><i class="fas fa-piggy-bank"></i><span>Savings Goals</span></div>
          </div>
        </div>
        <div class="main-content">
          <div class="top-header"><h2>Welcome, ${currentUser.name}</h2><div><button class="dark-toggle" id="darkModeBtn"><i class="fas fa-moon"></i> Dark Mode</button> <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
          <div id="tab-dashboard" class="tab-pane"><div class="stats-grid"><div class="stat-card"><i class="fas fa-wallet"></i><h3>Balance</h3><h2 id="balanceAmount">$0</h2></div><div class="stat-card"><i class="fas fa-arrow-up"></i><h3>Income</h3><h2 id="totalIncome">$0</h2></div><div class="stat-card"><i class="fas fa-arrow-down"></i><h3>Expenses</h3><h2 id="totalExpense">$0</h2></div></div><div class="card-panel"><h3>Recent Transactions</h3><div class="table-responsive"><table><thead><tr><th>Date</th><th>Category/Source</th><th>Amount</th></tr></thead><tbody id="recentTxBody"></tbody></table></div></div><div class="flex-row" style="gap:20px;"><div class="card-panel" style="flex:1"><h3>Expense Breakdown</h3><canvas id="expenseChart"></canvas></div><div class="card-panel" style="flex:1"><h3>Savings Goals Progress</h3><canvas id="savingsChart"></canvas></div></div><div class="card-panel"><h3>Budget Status</h3><div id="budgetAlerts"></div></div></div>
          <div id="tab-history" class="tab-pane hidden"><div class="card-panel"><h3>Transaction History</h3><div id="historyPanel" class="table-responsive"></div></div></div>
          <div id="tab-expense-income" class="tab-pane hidden"><div class="card-panel"><h3>Add Expense</h3><div class="flex-row"><input type="text" id="expCategory" placeholder="Category (Food, Rent)"><input type="number" id="expAmount" placeholder="Amount"><input type="date" id="expDate"><input type="text" id="expNote" placeholder="Note"><button id="addExpenseBtn">Add Expense</button></div></div><div class="card-panel"><h3>Expenses List</h3><div id="expenseList" class="table-responsive"></div></div><div class="card-panel"><h3>Add Income</h3><div class="flex-row"><input type="text" id="incSource" placeholder="Source (Salary)"><input type="number" id="incAmount" placeholder="Amount"><input type="date" id="incDate"><input type="text" id="incNote" placeholder="Note"><button id="addIncomeBtn">Add Income</button></div></div><div class="card-panel"><h3>Income List</h3><div id="incomeList" class="table-responsive"></div></div></div>
          <div id="tab-budget" class="tab-pane hidden"><div class="card-panel"><h3>Set Budget Limit</h3><div class="flex-row"><input type="text" id="budgetCategory" placeholder="Category (Food, etc)"><input type="number" id="budgetLimit" placeholder="Limit Amount"><button id="addBudgetBtn">Add Budget</button></div><div id="budgetList"></div></div></div>
          <div id="tab-savings" class="tab-pane hidden"><div class="card-panel"><h3>Create Savings Goal</h3><div class="flex-row"><input type="text" id="goalName" placeholder="Goal (Vacation, Emergency)"><input type="number" id="targetAmount" placeholder="Target Amount"><input type="number" id="currentAmount" placeholder="Current Saved"><input type="date" id="goalDeadline" placeholder="Deadline"><button id="addGoalBtn">Add Goal</button></div><div id="savingsList"></div></div></div>
        </div>
      </div>
    `;
    // Attach nav
    document.querySelectorAll('.nav-item').forEach(nav => {
      nav.addEventListener('click', () => showTab(nav.getAttribute('data-tab')));
    });
    document.getElementById('logoutBtn').onclick = () => { currentUser = null; renderAuth(); };
    document.getElementById('darkModeBtn').onclick = () => document.body.classList.toggle('dark');
    attachEventListeners();
    showTab('dashboard');
  }
  
  // AUTH UI
  function renderAuth() {
    document.getElementById('app').innerHTML = `
      <div class="auth-container">
        <div style="text-align:center"><i class="fas fa-coins" style="font-size:3rem; color:var(--primary)"></i><h2>FinDash</h2><p>Personal Finance Manager</p></div>
        <div id="authForm">
          <div><input type="text" id="authName" placeholder="Full name (for register)"><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"></div>
          <div class="flex-row" style="margin-top:1rem"><button id="loginBtn">Login</button><button id="registerBtn">Register</button></div>
          <div id="authMessage" class="message"></div>
        </div>
      </div>
    `;
    document.getElementById('loginBtn').onclick = () => {
      const email = document.getElementById('authEmail').value;
      const pwd = document.getElementById('authPassword').value;
      const res = login(email,pwd);
      if(res.success) { currentUser = res.user; buildMainUI(); }
      else document.getElementById('authMessage').innerText = res.message;
    };
    document.getElementById('registerBtn').onclick = () => {
      const name = document.getElementById('authName').value;
      const email = document.getElementById('authEmail').value;
      const pwd = document.getElementById('authPassword').value;
      if(!name||!email||!pwd) return alert('Fill all fields');
      const res = register(name,email,pwd);
      if(res.success) { currentUser = res.user; buildMainUI(); }
      else document.getElementById('authMessage').innerText = res.message;
    };
  }
  // Start app
  renderAuth();
</script>
</body>
</html>
